name: Build Android APK Without Buildozer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-setuptools \
            python3-venv \
            python3-dev \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            libffi-dev \
            libssl-dev \
            cmake \
            gettext \
            patch \
            ccache

      - name: Install python-for-android stable version
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "Cython<3" virtualenv
          python -m pip install python-for-android==2024.01.21

      - name: Clean old p4a files
        run: |
          rm -rf ~/.local/share/python-for-android
          rm -rf ./*.apk
          rm -rf ./.p4a

      - name: Build APK with python-for-android
        run: |
          p4a apk \
            --private . \
            --package=org.example.expensetracker \
            --name "Expense Tracker" \
            --version 1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy \
            --arch=arm64-v8a \
            --android-api=34 \
            --minsdk=23 \
            --ndk-api=23

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: ./*.apk
