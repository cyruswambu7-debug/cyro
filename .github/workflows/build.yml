name: Build Android APK Without Buildozer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-setuptools \
            python3-venv python3-dev build-essential autoconf automake \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo6 libffi-dev libssl-dev cmake gettext patch

      - name: Install python-for-android
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install cython virtualenv
          python3 -m pip install git+https://github.com/kivy/python-for-android.git

      - name: Create Android SDK folders
        run: |
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"

      - name: Build APK with python-for-android
        run: |
          p4a apk \
            --private . \
            --package=org.example.expensetracker \
            --name "Expense Tracker" \
            --version 1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy \
            --arch=arm64-v8a \
            --android-api=34 \
            --minsdk=23

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: ./*.apk
