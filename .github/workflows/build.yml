name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          pwd
          ls -la
          echo "----- buildozer.spec -----"
          cat buildozer.spec

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-setuptools \
            python3-venv \
            python3-dev \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            libffi-dev \
            libssl-dev \
            cmake \
            gettext \
            patch

      - name: Install Latest Buildozer from Source
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3  -m pip install git+https://github.com/kivy/buildozer.git@master

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Clean old Buildozer files
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: bin/*.apk
