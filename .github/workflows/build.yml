name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Build APK
        uses: digreatbrian/buildozer-action@v2
        with:
          buildozer-cmd: buildozer android debug
          python-version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: bin/*.apk
